<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CloudScout for Steam | 07x.nl</title>
  <meta name="description" content="CloudScout for Steam shows cloud gaming availability, Game Pass signals and Turkish language support on supported Steam and Epic store pages." />
  <meta name="theme-color" content="#0d0b14" />
  <link id="site-favicon" rel="icon" type="image/png" />
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/JobYu/Pix32@main/website/32.woff" as="font" type="font/woff" crossorigin />
  <script>
    document.documentElement.classList.add("js");
  </script>
  <style>
    @font-face {
      font-family: "Pix32";
      src:
        url("https://cdn.jsdelivr.net/gh/JobYu/Pix32@main/website/32.woff") format("woff"),
        url("https://raw.githubusercontent.com/JobYu/Pix32/main/website/32.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0d0b14;
      --text: #e8e6f0;
      --muted: #8a8898;
      --accent: #6eb5ff;
      --warm: #ff9a53;
      --border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: "Pix32", "Segoe UI", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
    }

    .hero {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #spaceCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: pan-y;
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 76% 24%, rgba(110, 181, 255, 0.11), rgba(110, 181, 255, 0) 49%),
        linear-gradient(to bottom, rgba(6, 4, 15, 0) 70%, rgba(6, 4, 15, 0.32) 100%);
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(3rem, env(safe-area-inset-top))
        max(1.2rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(1.2rem, env(safe-area-inset-left));
    }

    .page-container {
      width: min(100%, 980px);
      padding: 1.1rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(8, 8, 18, 0.52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 32px rgba(3, 4, 12, 0.38);
    }

    .page-shell {
      border-radius: 14px;
      padding: 1.35rem;
      background: rgba(5, 6, 14, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: opacity 520ms ease, transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .js .page-shell {
      opacity: 0;
      transform: translate3d(0, 22px, 0);
      will-change: opacity, transform;
    }

    .js body.page-ready .page-shell {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .back-nav,
    .lang-switch {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .back-link,
    .lang-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.55rem 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 8, 18, 0.45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      cursor: pointer;
      font-family: inherit;
    }

    .back-link:hover,
    .back-link:focus-visible,
    .lang-btn:hover,
    .lang-btn:focus-visible {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(14, 14, 28, 0.6);
      outline: none;
      transform: translate3d(0, -1px, 0);
    }

    .lang-btn.active {
      color: var(--text);
      border-color: rgba(110, 181, 255, 0.34);
      background: rgba(110, 181, 255, 0.1);
    }

    .hero-card,
    .info-card {
      margin: 0;
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(9, 9, 20, 0.42);
      box-shadow: var(--card-shadow);
      transition: opacity 420ms ease, transform 520ms cubic-bezier(0.22, 1, 0.36, 1), border-color 0.22s ease;
    }

    .hero-card { margin-bottom: 1rem; }

    .info-card:hover {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .section-grid {
      display: grid;
      gap: 1rem;
      content-visibility: auto;
      contain-intrinsic-size: 1200px;
    }

    .js .hero-card,
    .js .info-card {
      opacity: 0;
      transform: translate3d(0, 16px, 0);
      will-change: opacity, transform;
    }

    .js body.page-ready .hero-card,
    .js body.page-ready .info-card {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .js body.page-ready .section-grid .info-card:nth-child(1) { transition-delay: 90ms; }
    .js body.page-ready .section-grid .info-card:nth-child(2) { transition-delay: 140ms; }
    .js body.page-ready .section-grid .info-card:nth-child(3) { transition-delay: 190ms; }
    .js body.page-ready .section-grid .info-card:nth-child(4) { transition-delay: 240ms; }
    .js body.page-ready .section-grid .info-card:nth-child(5) { transition-delay: 290ms; }
    .js body.page-ready .section-grid .info-card:nth-child(6) { transition-delay: 340ms; }
    .js body.page-ready .section-grid .info-card:nth-child(7) { transition-delay: 390ms; }
    .js body.page-ready .section-grid .info-card:nth-child(8) { transition-delay: 440ms; }
    .js body.page-ready .section-grid .info-card:nth-child(9) { transition-delay: 490ms; }

    .hero-header {
      display: flex;
      align-items: center;
      gap: 0.95rem;
      margin-bottom: 0.85rem;
      flex-wrap: wrap;
    }

    .logo-badge {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(160deg, rgba(16, 20, 34, 0.98), rgba(11, 14, 26, 0.92));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 10px 24px rgba(0, 0, 0, 0.34);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 56px;
      animation: logoFloat 5.5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -3px, 0); }
    }

    .logo-badge svg {
      width: 40px;
      height: 40px;
      display: block;
    }

    .page-title {
      margin: 0;
      font-size: 1.48rem;
      font-weight: 400;
      color: var(--text);
    }

    .hero-summary,
    .body-text,
    .support-text,
    .legal-text,
    .privacy-link-text,
    .note-box {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .cta-link,
    .cta-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      min-height: 42px;
      padding: 0.68rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      text-decoration: none;
      font-size: 0.86rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, color 0.22s ease, box-shadow 0.22s ease;
    }

    .cta-link:hover,
    .cta-link:focus-visible {
      transform: translate3d(0, -1px, 0);
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.07);
      outline: none;
    }

    .cta-link--store {
      color: #0f172a;
      background: linear-gradient(145deg, rgba(255, 214, 170, 0.98), rgba(255, 154, 83, 0.94));
      border-color: rgba(255, 198, 150, 0.95);
      box-shadow: 0 10px 24px rgba(255, 136, 56, 0.22);
      font-weight: 400;
    }

    .cta-link--store:hover,
    .cta-link--store:focus-visible {
      color: #0b1220;
      border-color: rgba(255, 220, 180, 1);
      background: linear-gradient(145deg, rgba(255, 224, 190, 1), rgba(255, 168, 100, 0.98));
      box-shadow: 0 14px 28px rgba(255, 136, 56, 0.28);
      transform: translate3d(0, -2px, 0);
    }

    .cta-link--accent {
      border-color: rgba(110, 181, 255, 0.32);
      color: var(--accent);
      background: rgba(110, 181, 255, 0.08);
    }

    .section-title {
      margin: 0 0 0.8rem 0;
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--accent);
      text-transform: lowercase;
    }

    .feature-list,
    .summary-list,
    .provider-list,
    .ordered-list {
      margin: 0;
      padding-left: 1.1rem;
      color: var(--muted);
      font-size: 0.9rem;
      display: grid;
      gap: 0.5rem;
    }

    .provider-list {
      list-style: none;
      padding: 0;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.65rem;
    }

    .provider-list li {
      padding: 0.8rem 0.9rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      font-size: 0.88rem;
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
    }

    .provider-list li:hover {
      transform: translate3d(0, -2px, 0);
      border-color: rgba(110, 181, 255, 0.28);
      background: rgba(110, 181, 255, 0.08);
    }

    .note-box {
      padding: 0.9rem 0.95rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: rgba(255, 255, 255, 0.03);
    }

    .support-link,
    .inline-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .support-link:hover,
    .support-link:focus-visible,
    .inline-link:hover,
    .inline-link:focus-visible {
      color: var(--text);
      border-color: currentColor;
      outline: none;
    }

    .inline-code {
      font-family: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.08rem 0.35rem;
    }

    @media (prefers-reduced-motion: reduce) {
      .page-shell,
      .hero-card,
      .info-card,
      .back-link,
      .lang-btn,
      .cta-link,
      .support-link,
      .inline-link,
      .logo-badge,
      .provider-list li {
        transition: none !important;
        animation: none !important;
      }
    }

    @media (max-width: 640px) {
      .content-wrapper { padding: 1.4rem 1rem 2rem; }
      .page-container { padding: 0.8rem; }
      .page-shell { padding: 1rem; }
      .hero-card,
      .info-card { padding: 0.9rem; }
      .page-title { font-size: 1.22rem; }
      .logo-badge { width: 48px; height: 48px; flex-basis: 48px; border-radius: 14px; }
      .logo-badge svg { width: 34px; height: 34px; }
      .top-row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="hero" id="hero">
    <canvas id="spaceCanvas" aria-hidden="true"></canvas>
    <div class="hero-vignette" aria-hidden="true"></div>
  </div>

  <main class="content-wrapper">

        <div class="top-row">

          </div>
          <div class="lang-switch" aria-label="language switch">
            <button type="button" class="lang-btn" data-lang-choice="tr">TR</button>
            <button type="button" class="lang-btn" data-lang-choice="en">EN</button>
          </div>
        </div>

        <section class="hero-card">
          <div class="hero-header">

              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="7" y="9" width="50" height="46" rx="14" fill="#121726" />

                <path d="M24 27.5C25.7 23.5 29.7 21 34.1 21C38.2 21 41.8 23.2 43.7 26.7C47.6 27 50.8 30 51.5 33.9C52.8 28.3 48.6 22.2 42.1 21.8C39.9 17.4 35.4 14.5 30.2 14.5C24.1 14.5 19 18.4 17.7 24.3C14 24.8 11 27.6 10.2 31.2C12 29 14.9 27.5 18.2 27.5H24Z" fill="#55A8FF" opacity="0.95" />
                <rect x="15" y="41.5" width="34" height="5.5" rx="2.75" fill="#3A8BFF" />
                <defs>
                  <linearGradient id="cloudBg" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">

                  <linearGradient id="cloudFill" x1="33" y1="17" x2="33" y2="40.5" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#F7FAFF" />
                    <stop offset="1" stop-color="#DAE9FF" />
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <h1 class="page-title" id="heroTitle"></h1>
          </div>
          <p class="hero-summary" id="heroSummary"></p>
          <div class="cta-row">
            <a
              href="https://chromewebstore.google.com/detail/cloudscout-for-steam/oollmbjppnfihcdmjdgkgekedcikbmgd"
              class="cta-link cta-link--store"
              id="chromeStoreLink"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
            <a href="privacy/" class="cta-link cta-link--accent" id="privacyHeroLink"></a>
          </div>
        </section>

        <div class="section-grid">
          <section class="info-card">
            <h2 class="section-title" id="shortTitle"></h2>
            <p class="body-text" id="shortBody"></p>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="featuresTitle"></h2>
            <ul class="feature-list" id="featuresList"></ul>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="providersTitle"></h2>
            <ul class="provider-list" id="providersList"></ul>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="howTitle"></h2>
            <ol class="ordered-list" id="howList"></ol>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="privacySummaryTitle"></h2>
            <ul class="summary-list" id="privacySummaryList"></ul>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="permissionsTitle"></h2>
            <ul class="summary-list" id="permissionsList"></ul>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="transparencyTitle"></h2>
            <div class="note-box" id="transparencyBody"></div>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="supportTitle"></h2>
            <p class="support-text" id="supportLine1"></p>
            <p class="support-text" id="supportLine2" style="margin-top: 0.55rem;"></p>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="privacyLinkTitle"></h2>
            <p class="privacy-link-text" id="privacyLinkBody"></p>
          </section>

          <section class="info-card">
            <h2 class="section-title" id="legalTitle"></h2>
            <p class="legal-text" id="legalBody"></p>
          </section>
        </div>
      </div>
    </div>
  </main>

            "NVIDIA GeForce NOW, Boosteroid, Xbox Cloud Gaming, Game Pass, Amazon Luna, and Shadow PC signals",
            "Turkish interface, subtitle, and voice signals from Steam and Epic metadata",
            "Clear available, unavailable, unknown, and conditional states",
            "Settings for provider visibility and language preferences"
          ],
          providersTitle: "what CloudScout shows",
          providers: [
            "NVIDIA GeForce NOW",
            "Boosteroid",
            "Xbox Cloud Gaming",
            "Xbox Game Pass Core / Standard / Ultimate",
            "Amazon Luna",
            "Shadow PC (Full Cloud PC)",
            "Turkish interface, subtitles, and voice",
            "Available / unavailable / unknown / conditional"
          ],
          howTitle: "how it works",
          how: [
            "Open a supported Steam or Epic store page.",
            "The CloudScout panel appears on the product page; badges may appear on list and search cards.",
            "Review cloud availability, Game Pass, and Turkish language support signals directly on the page."
          ],
          privacySummaryTitle: "privacy summary",
          privacySummary: [
            "Does not require an account.",
            "Does not use analytics or tracking.",
            "Does not collect personal data.",
            "Does not request broad access to unrelated sites.",
            "Works with minimum permissions.",
            "Does not run remote JavaScript."
          ],
          permissionsTitle: "permissions summary",
          permissions: [
            "<span class='inline-code'>storage</span>: for user settings and local cache",
            "Access to supported Steam and Epic store pages: to read product pages and verify language support"
          ],
          transparencyTitle: "transparency note",
          transparencyBody: "Provider availability data comes from bundled local snapshot catalogs in this version. When information cannot be verified, CloudScout shows <span class='inline-code'>unknown</span> or <span class='inline-code'>conditional</span> instead of overstated green checks.",
          supportTitle: "support",
          supportLine1: "For questions and bug reports: <a href='mailto:support@07x.nl' class='support-link'>support@07x.nl</a>",
          supportLine2: "Support responses are provided via email.",
          privacyLinkTitle: "privacy link",
          privacyLinkBody: "For details about processed data, local storage behavior, and network access, see the <a href='privacy/' class='inline-link'>CloudScout for Steam Privacy Policy</a> page.",
          legalTitle: "legal note",
          legalBody: "CloudScout for Steam is not affiliated with Valve, Steam, Epic Games, or the listed cloud providers. The Steam, Epic, and related names are referenced only to explain compatibility and usage context."
        }
      };

      const listIds = ["featuresList", "providersList", "howList", "privacySummaryList", "permissionsList"];
      const langButtons = Array.from(document.querySelectorAll("[data-lang-choice]"));
      const savedLang = localStorage.getItem("cloudscout-lang");
      const initialLang = savedLang === "tr" || savedLang === "en"
        ? savedLang
        : (navigator.language && navigator.language.toLowerCase().startsWith("tr") ? "tr" : "en");

      function renderList(id, items) {
        document.getElementById(id).innerHTML = items.map((item) => `<li>${item}</li>`).join("");
      }

      function applyLanguage(lang) {
        const t = translations[lang];
        document.documentElement.lang = lang;
        document.title = t.docTitle;
        document.getElementById("homeLink").textContent = t.homeLink;
        document.getElementById("privacyNavLink").textContent = t.privacyNav;
        document.getElementById("heroTitle").textContent = t.heroTitle;
        document.getElementById("heroSummary").textContent = t.heroSummary;
        document.getElementById("chromeStoreLink").textContent = t.chromeStore;
        document.getElementById("privacyHeroLink").textContent = t.privacyHero;
        document.getElementById("shortTitle").textContent = t.shortTitle;
        document.getElementById("shortBody").textContent = t.shortBody;
        document.getElementById("featuresTitle").textContent = t.featuresTitle;
        document.getElementById("providersTitle").textContent = t.providersTitle;
        document.getElementById("howTitle").textContent = t.howTitle;
        document.getElementById("privacySummaryTitle").textContent = t.privacySummaryTitle;
        document.getElementById("permissionsTitle").textContent = t.permissionsTitle;
        document.getElementById("transparencyTitle").textContent = t.transparencyTitle;
        document.getElementById("transparencyBody").innerHTML = t.transparencyBody;
        document.getElementById("supportTitle").textContent = t.supportTitle;
        document.getElementById("supportLine1").innerHTML = t.supportLine1;
        document.getElementById("supportLine2").textContent = t.supportLine2;
        document.getElementById("privacyLinkTitle").textContent = t.privacyLinkTitle;
        document.getElementById("privacyLinkBody").innerHTML = t.privacyLinkBody;
        document.getElementById("legalTitle").textContent = t.legalTitle;
        document.getElementById("legalBody").textContent = t.legalBody;
        renderList("featuresList", t.features);
        renderList("providersList", t.providers);
        renderList("howList", t.how);
        renderList("privacySummaryList", t.privacySummary);
        renderList("permissionsList", t.permissions);
        localStorage.setItem("cloudscout-lang", lang);
        langButtons.forEach((button) => {
          const isActive = button.dataset.langChoice === lang;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
      }

      langButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.langChoice));
      });

      applyLanguage(initialLang);
    })();
  </script>

  <script>
    (() => {
      const canvas = document.getElementById("spaceCanvas");
      const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
      const faviconLink = document.getElementById("site-favicon");
      const motionMedia = window.matchMedia("(prefers-reduced-motion: reduce)");

      if (!ctx) return;
      ctx.imageSmoothingEnabled = false;

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        time: 0,
        lastTimestamp: 0,
        earthRotation: Math.random() * Math.PI * 2,
        lastFaviconUpdate: 0,
        stars: [],
        reducedMotion: motionMedia.matches,
        running: false,
        rafId: 0
      };

      function createStars() {
        const count = state.width < 720 ? 75 : 110;
        state.stars = Array.from({ length: count }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          size: Math.random() * 1.5 + 0.45,
          speed: Math.random() * 10 + 8,
          alpha: Math.random() * 0.55 + 0.2,
          twinkleSpeed: Math.random() * 1.8 + 0.8,
          twinklePhase: Math.random() * Math.PI * 2
        }));
      }

      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function normalize(vector) {
        const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
        return { x: vector.x / length, y: vector.y / length, z: vector.z / length };
      }
      function blendColor(a, b, amount) {
        const t = clamp(amount, 0, 1);
        return { r: Math.round(a.r + (b.r - a.r) * t), g: Math.round(a.g + (b.g - a.g) * t), b: Math.round(a.b + (b.b - a.b) * t) };
      }
      function shadeColor(color, factor) {
        const f = Math.max(0, factor);
        return { r: clamp(Math.round(color.r * f), 0, 255), g: clamp(Math.round(color.g * f), 0, 255), b: clamp(Math.round(color.b * f), 0, 255) };
      }
      function toRgb(color) { return "rgb(" + color.r + ", " + color.g + ", " + color.b + ")"; }
      function terrainValue(longitude, latitude, rotation) {
        const waveA = Math.sin(longitude * 1.78 + rotation * 0.94 + 0.45);
        const waveB = Math.sin(longitude * 3.86 - latitude * 2.52 + 1.18);
        const waveC = Math.sin(longitude * 7.31 + latitude * 5.27 - 0.74);
        const waveD = Math.sin((longitude + latitude) * 4.62 + 2.33);
        const waveE = Math.sin(latitude * 6.41 - longitude * 2.08 + 0.61);
        return waveA * 0.45 + waveB * 0.29 + waveC * 0.16 + waveD * 0.1 + waveE * 0.08 - 0.03;
      }
      function cloudValue(longitude, latitude, rotation) {
        const cloudA = Math.sin(longitude * 11.4 + latitude * 7.7 + rotation * 0.36 + 1.4);
        const cloudB = Math.sin(longitude * 16.3 - latitude * 13.1 - rotation * 0.22 + 0.25);
        const cloudC = Math.sin((longitude - latitude) * 18.9 + 0.82);
        return cloudA * 0.44 + cloudB * 0.35 + cloudC * 0.21;
      }

      function updateFavicon(rotation) {
        if (!faviconLink) return;
        const size = 256;
        const iconCanvas = document.createElement("canvas");
        iconCanvas.width = size;
        iconCanvas.height = size;
        const iconCtx = iconCanvas.getContext("2d");
        if (!iconCtx) return;
        const center = size * 0.5;
        const radius = size * 0.38;
        const pixel = 4;
        const glow = iconCtx.createRadialGradient(center, center, radius * 0.72, center, center, radius * 1.55);
        glow.addColorStop(0, "rgba(110,181,255,0.32)");
        glow.addColorStop(1, "rgba(110,181,255,0)");
        iconCtx.fillStyle = glow;
        iconCtx.beginPath();
        iconCtx.arc(center, center, radius * 1.55, 0, Math.PI * 2);
        iconCtx.fill();
        const light = normalize({ x: 0.58, y: -0.34, z: 0.74 });
        const cosRotation = Math.cos(rotation);
        const sinRotation = Math.sin(rotation);
        for (let py = -radius; py <= radius; py += pixel) {
          for (let px = -radius; px <= radius; px += pixel) {
            const nx = (px + pixel * 0.5) / radius;
            const ny = (py + pixel * 0.5) / radius;
            const distSq = nx * nx + ny * ny;
            if (distSq > 1) continue;
            const nz = Math.sqrt(1 - distSq);
            const tx = nx * cosRotation + nz * sinRotation;
            const tz = -nx * sinRotation + nz * cosRotation;
            const longitude = Math.atan2(tz, tx);
            const latitude = Math.asin(ny);
            const polarAmount = Math.abs(latitude);
            const terrain = terrainValue(longitude, latitude, rotation);
            const cloud = cloudValue(longitude, latitude, rotation);
            let baseColor;
            if (polarAmount > 1.17) {
              baseColor = { r: 207, g: 233, b: 252 };
            } else if (terrain > 0.03) {
              const richness = clamp((terrain + 0.4) * 0.95, 0, 1.2);
              baseColor = { r: 47 + Math.round(34 * richness), g: 101 + Math.round(76 * richness), b: 66 + Math.round(33 * richness) };
            } else {
              const depth = clamp(Math.abs(terrain) * 1.95, 0, 1);
              baseColor = { r: 19 + Math.round(18 * depth), g: 65 + Math.round(43 * depth), b: 126 + Math.round(80 * depth) };
            }
            if (cloud > 0.74 && polarAmount < 1.43) {
              const cloudMix = clamp((cloud - 0.74) * 2.25 + 0.1, 0.12, 0.72);
              baseColor = blendColor(baseColor, { r: 235, g: 244, b: 255 }, cloudMix);
            }
            const dotProduct = Math.max(0, nx * light.x + ny * light.y + nz * light.z);
            const shadedColor = shadeColor(baseColor, 0.24 + dotProduct * 0.9);
            iconCtx.fillStyle = toRgb(shadedColor);
            iconCtx.fillRect(Math.round(center + px), Math.round(center + py), pixel, pixel);
          }
        }
        faviconLink.href = iconCanvas.toDataURL("image/png", 1.0);
      }

      function resize() {
        state.width = Math.max(1, Math.floor(window.innerWidth));
        state.height = Math.max(1, Math.floor(window.innerHeight));
        state.dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = state.width + "px";
        canvas.style.height = state.height + "px";
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        createStars();
        draw();
        updateFavicon(state.earthRotation);
      }

      function updateStars(deltaSeconds) {
        for (const star of state.stars) {
          star.y -= star.speed * deltaSeconds;
          if (star.y < -2) {
            star.y = state.height + 2;
            star.x = Math.random() * state.width;
          }
        }
      }

      function draw() {
        ctx.fillStyle = "#0d0b14";
        ctx.fillRect(0, 0, state.width, state.height);
        for (const star of state.stars) {
          const twinkle = 0.65 + Math.sin(state.time * star.twinkleSpeed + star.twinklePhase) * 0.35;
          ctx.fillStyle = "rgba(255,255,255," + Math.max(0.12, star.alpha * twinkle).toFixed(3) + ")";
          ctx.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      function frame(timestamp) {
        if (!state.running) return;
        if (!state.lastTimestamp) state.lastTimestamp = timestamp;
        const deltaSeconds = Math.min(0.05, (timestamp - state.lastTimestamp) / 1000);
        state.lastTimestamp = timestamp;
        state.time += deltaSeconds;
        state.earthRotation += deltaSeconds * 0.16;
        updateStars(deltaSeconds);
        draw();
        if (timestamp - state.lastFaviconUpdate > 12000) {
          updateFavicon(state.earthRotation);
          state.lastFaviconUpdate = timestamp;
        }
        state.rafId = window.requestAnimationFrame(frame);
      }

      function startAnimation() {
        if (state.running || state.reducedMotion) return;
        state.running = true;
        state.lastTimestamp = 0;
        state.rafId = window.requestAnimationFrame(frame);
      }

      function stopAnimation() {
        state.running = false;
        if (state.rafId) {
          window.cancelAnimationFrame(state.rafId);
          state.rafId = 0;
        }
      }

      function updateMotionPreference(isReduced) {
        state.reducedMotion = isReduced;
        if (state.reducedMotion) {
          stopAnimation();
          draw();
          return;
        }
        if (!document.hidden) startAnimation();
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopAnimation();
          return;
        }
        if (!state.reducedMotion) startAnimation();
      });

      if (typeof motionMedia.addEventListener === "function") {
        motionMedia.addEventListener("change", (event) => updateMotionPreference(event.matches));
      } else if (typeof motionMedia.addListener === "function") {
        motionMedia.addListener((event) => updateMotionPreference(event.matches));
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();
      window.requestAnimationFrame(() => document.body.classList.add("page-ready"));
      updateMotionPreference(state.reducedMotion);
      updateFavicon(state.earthRotation);
      state.lastFaviconUpdate = performance.now();
    })();
  </script>
