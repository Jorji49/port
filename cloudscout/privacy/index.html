<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CloudScout for Steam Privacy Policy | 07x.nl</title>
  <meta name="description" content="Privacy policy for CloudScout for Steam. No account, no analytics, no personal data collection. Local snapshot catalogs and minimal permissions." />
  <meta name="theme-color" content="#0d0b14" />
  <link id="site-favicon" rel="icon" type="image/png" />
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preload" href="https://cdn.jsdelivr.net/gh/JobYu/Pix32@main/website/32.woff" as="font" type="font/woff" crossorigin />
  <script>
    document.documentElement.classList.add("js");
  </script>
  <style>
    @font-face {
      font-family: "Pix32";
      src:
        url("https://cdn.jsdelivr.net/gh/JobYu/Pix32@main/website/32.woff") format("woff"),
        url("https://raw.githubusercontent.com/JobYu/Pix32/main/website/32.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #0d0b14;
      --text: #e8e6f0;
      --muted: #8a8898;
      --accent: #6eb5ff;
      --border: rgba(255, 255, 255, 0.08);
      --card-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background: var(--bg);
      color: var(--text);
    }

    body {
      font-family: "Pix32", "Segoe UI", sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
    }

    .hero {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #spaceCanvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: pan-y;
    }

    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 76% 24%, rgba(110, 181, 255, 0.11), rgba(110, 181, 255, 0) 49%),
        linear-gradient(to bottom, rgba(6, 4, 15, 0) 70%, rgba(6, 4, 15, 0.32) 100%);
    }

    .content-wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(3rem, env(safe-area-inset-top))
        max(1.2rem, env(safe-area-inset-right))
        max(2rem, env(safe-area-inset-bottom))
        max(1.2rem, env(safe-area-inset-left));
    }

    .page-container {
      width: min(100%, 900px);
      padding: 1.1rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        rgba(8, 8, 18, 0.52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 14px 32px rgba(3, 4, 12, 0.38);
    }

    .page-shell {
      border-radius: 14px;
      padding: 1.35rem;
      background: rgba(5, 6, 14, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.06);
      transition: opacity 520ms ease, transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .js .page-shell {
      opacity: 0;
      transform: translate3d(0, 22px, 0);
      will-change: opacity, transform;
    }

    .js body.page-ready .page-shell {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .back-nav,
    .lang-switch {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .back-link,
    .lang-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      padding: 0.55rem 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(8, 8, 18, 0.45);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      cursor: pointer;
      font-family: inherit;
    }

    .back-link:hover,
    .back-link:focus-visible,
    .lang-btn:hover,
    .lang-btn:focus-visible {
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.2);
      background: rgba(14, 14, 28, 0.6);
      outline: none;
      transform: translate3d(0, -1px, 0);
    }

    .lang-btn.active {
      color: var(--text);
      border-color: rgba(110, 181, 255, 0.34);
      background: rgba(110, 181, 255, 0.1);
    }

    .policy-header,
    .policy-card {
      margin: 0;
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        rgba(9, 9, 20, 0.42);
      box-shadow: var(--card-shadow);
      transition: opacity 420ms ease, transform 520ms cubic-bezier(0.22, 1, 0.36, 1), border-color 0.22s ease;
    }

    .policy-header { margin-bottom: 1rem; }

    .policy-card:hover {
      border-color: rgba(255, 255, 255, 0.14);
    }

    .section-grid {
      display: grid;
      gap: 1rem;
      content-visibility: auto;
      contain-intrinsic-size: 1100px;
    }

    .js .policy-header,
    .js .policy-card {
      opacity: 0;
      transform: translate3d(0, 16px, 0);
      will-change: opacity, transform;
    }

    .js body.page-ready .policy-header,
    .js body.page-ready .policy-card {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .js body.page-ready .section-grid .policy-card:nth-child(1) { transition-delay: 90ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(2) { transition-delay: 140ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(3) { transition-delay: 190ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(4) { transition-delay: 240ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(5) { transition-delay: 290ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(6) { transition-delay: 340ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(7) { transition-delay: 390ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(8) { transition-delay: 440ms; }
    .js body.page-ready .section-grid .policy-card:nth-child(9) { transition-delay: 490ms; }

    .header-row {
      display: flex;
      align-items: center;
      gap: 0.95rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .logo-badge {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(160deg, rgba(16, 20, 34, 0.98), rgba(11, 14, 26, 0.92));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.12), 0 10px 24px rgba(0, 0, 0, 0.34);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 54px;
      animation: logoFloat 5.5s ease-in-out infinite;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(0, -3px, 0); }
    }

    .logo-badge svg { width: 38px; height: 38px; display: block; }

    .page-title {
      font-size: 1.35rem;
      font-weight: 400;
      margin: 0;
      color: var(--text);
    }

    .last-updated,
    .body-text,
    .contact-text {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .section-title {
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--accent);
      margin: 0 0 0.8rem 0;
      text-transform: lowercase;
    }

    .policy-list {
      margin: 0;
      padding-left: 1.1rem;
      display: grid;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .inline-code {
      font-family: inherit;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 0.08rem 0.35rem;
    }

    .contact-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .contact-link:hover,
    .contact-link:focus-visible {
      color: var(--text);
      border-color: currentColor;
      outline: none;
    }

    @media (prefers-reduced-motion: reduce) {
      .page-shell,
      .policy-header,
      .policy-card,
      .back-link,
      .lang-btn,
      .contact-link,
      .logo-badge {
        transition: none !important;
        animation: none !important;
      }
    }

    @media (max-width: 640px) {
      .content-wrapper { padding: 1.4rem 1rem 2rem; }
      .page-container { padding: 0.8rem; }
      .page-shell { padding: 1rem; }
      .policy-header,
      .policy-card { padding: 0.9rem; }
      .page-title { font-size: 1.16rem; }
      .logo-badge { width: 48px; height: 48px; flex-basis: 48px; border-radius: 14px; }
      .logo-badge svg { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>
  <div class="hero" id="hero">
    <canvas id="spaceCanvas" aria-hidden="true"></canvas>
    <div class="hero-vignette" aria-hidden="true"></div>
  </div>

  <main class="content-wrapper">
    <div class="page-container">
      <div class="page-shell">
        <div class="top-row">
          <div class="back-nav">
            <a href="../" class="back-link" id="productLink">&larr; back to cloudscout</a>
            <a href="../../index.html" class="back-link" id="homeLink">home</a>
          </div>
          <div class="lang-switch" aria-label="language switch">
            <button type="button" class="lang-btn" data-lang-choice="tr">TR</button>
            <button type="button" class="lang-btn" data-lang-choice="en">EN</button>
          </div>
        </div>

        <section class="policy-header">
          <div class="header-row">
            <div class="logo-badge" aria-hidden="true">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="7" y="9" width="50" height="46" rx="14" fill="#121726" />
                <rect x="10" y="12" width="44" height="40" rx="12" fill="url(#cloudBg)" />
                <path d="M21 40.5C15.8 40.5 12 36.9 12 32.3C12 28.1 15.2 24.8 19.3 24.3C20.6 18.4 25.7 14.5 31.8 14.5C37 14.5 41.5 17.4 43.7 21.8C49.4 22 54 26.5 54 32.1C54 36.8 50.2 40.5 45.3 40.5H21Z" fill="url(#cloudFill)" />
                <path d="M24 27.5C25.7 23.5 29.7 21 34.1 21C38.2 21 41.8 23.2 43.7 26.7C47.6 27 50.8 30 51.5 33.9C52.8 28.3 48.6 22.2 42.1 21.8C39.9 17.4 35.4 14.5 30.2 14.5C24.1 14.5 19 18.4 17.7 24.3C14 24.8 11 27.6 10.2 31.2C12 29 14.9 27.5 18.2 27.5H24Z" fill="#55A8FF" opacity="0.95" />
                <rect x="15" y="41.5" width="34" height="5.5" rx="2.75" fill="#3A8BFF" />
                <defs>
                  <linearGradient id="cloudBg" x1="32" y1="12" x2="32" y2="52" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#1A2237" />
                    <stop offset="1" stop-color="#101625" />
                  </linearGradient>
                  <linearGradient id="cloudFill" x1="33" y1="17" x2="33" y2="40.5" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#F7FAFF" />
                    <stop offset="1" stop-color="#DAE9FF" />
                  </linearGradient>
                </defs>
              </svg>
            </div>
            <div>
              <h1 class="page-title" id="pageTitle"></h1>
              <p class="last-updated" id="lastUpdated"></p>
            </div>
          </div>
        </section>

        <div class="section-grid">
          <section class="policy-card"><h2 class="section-title" id="whatItDoesTitle"></h2><p class="body-text" id="whatItDoesBody"></p></section>
          <section class="policy-card"><h2 class="section-title" id="processedDataTitle"></h2><ul class="policy-list" id="processedDataList"></ul></section>
          <section class="policy-card"><h2 class="section-title" id="whyProcessedTitle"></h2><ul class="policy-list" id="whyProcessedList"></ul></section>
          <section class="policy-card"><h2 class="section-title" id="storedLocallyTitle"></h2><ul class="policy-list" id="storedLocallyList"></ul></section>
          <section class="policy-card"><h2 class="section-title" id="notCollectedTitle"></h2><ul class="policy-list" id="notCollectedList"></ul></section>
          <section class="policy-card"><h2 class="section-title" id="networkAccessTitle"></h2><p class="body-text" id="networkAccessBody1"></p><p class="body-text" id="networkAccessBody2" style="margin-top: 0.55rem;"></p></section>
          <section class="policy-card"><h2 class="section-title" id="dataSharingTitle"></h2><p class="body-text" id="dataSharingBody1"></p><p class="body-text" id="dataSharingBody2" style="margin-top: 0.55rem;"></p></section>
          <section class="policy-card"><h2 class="section-title" id="securityTitle"></h2><ul class="policy-list" id="securityList"></ul></section>
          <section class="policy-card"><h2 class="section-title" id="contactTitle"></h2><p class="contact-text" id="contactBody"></p></section>
        </div>
      </div>
    </div>
  </main>

  <script>
    (() => {
      const translations = {
        tr: {
          docTitle: "CloudScout for Steam Privacy Policy | 07x.nl",
          productLink: "← cloudscout",
          homeLink: "ana sayfa",
          pageTitle: "CloudScout for Steam Privacy Policy",
          lastUpdated: "Son güncelleme: 17 Temmuz 2026",
          whatItDoesTitle: "what it does",
          whatItDoesBody: "CloudScout for Steam, desteklenen Steam ve Epic Games Store sayfalarında cloud gaming uygunluğu, Game Pass sinyalleri ve Türkçe dil desteği bilgilerini göstermek için geliştirilmiş bir tarayıcı uzantısıdır.",
          processedDataTitle: "what data is processed",
          processedData: [
            "Steam / Epic ürün kimlikleri (App ID vb.)",
            "oyun başlığı",
            "geliştirici ve yayıncı metni (varsa)",
            "Steam ve Epic dil desteği bilgileri",
            "kullanıcı ayarları",
            "yerel cache / snapshot catalog verileri"
          ],
          whyProcessedTitle: "why it is processed",
          whyProcessed: [
            "görüntülenen oyun için cloud availability ve Game Pass sinyallerini göstermek",
            "Türkçe arayüz, altyazı ve ses desteğini tespit etmek",
            "kullanıcı ayarlarını hatırlamak",
            "performans için yerel cache kullanmak"
          ],
          storedLocallyTitle: "what is stored locally",
          storedLocally: [
            "kullanıcı ayarları",
            "uzantıya gömülü yerel snapshot catalog verileri",
            "popup için son analiz özeti"
          ],
          notCollectedTitle: "what is not collected",
          notCollected: [
            "kişisel kimlik bilgileri",
            "Steam veya Epic giriş bilgileri",
            "ödeme bilgileri",
            "satın alma geçmişi",
            "desteklenen mağaza sayfaları dışındaki gezinme geçmişi",
            "analytics veya tracking event verileri"
          ],
          networkAccessTitle: "network access",
          networkAccessBody1: "Mevcut sürümde uzantı yalnızca desteklenen Steam ve Epic mağaza sayfalarındaki ürün bilgilerini okur; ilgisiz sitelere geniş erişim istemez.",
          networkAccessBody2: "Sağlayıcı uygunluk verileri bu sürümde uzantıya gömülü yerel snapshot katalogları olarak gelir. Üçüncü taraf provider domain’lerinden runtime catalog fetch yapılmaz. Uzantı uzak JavaScript çalıştırmaz.",
          dataSharingTitle: "data sharing",
          dataSharingBody1: "Uzantı kişisel verileri geliştirici sunucularına göndermez ve üçüncü taraflarla paylaşmaz. Hesap gerektirmez; analitik veya takip kullanmaz.",
          dataSharingBody2: "Kullanıcı isteğe bağlı olarak destek e-postasına bilgi gönderirse, yalnızca kullanıcının paylaştığı bilgiler destek amacıyla değerlendirilir.",
          securityTitle: "security",
          security: [
            "Manifest V3",
            "No remote JavaScript",
            "Minimal permissions",
            "No broad access to unrelated sites",
            "Local-only settings and snapshot catalogs",
            "No analytics or tracking",
            "No account required"
          ],
          contactTitle: "contact",
          contactBody: "<a href='mailto:support@07x.nl' class='contact-link'>support@07x.nl</a>"
        },
        en: {
          docTitle: "CloudScout for Steam Privacy Policy | 07x.nl",
          productLink: "← back to cloudscout",
          homeLink: "home",
          pageTitle: "CloudScout for Steam Privacy Policy",
          lastUpdated: "Last updated: July 17, 2026",
          whatItDoesTitle: "what it does",
          whatItDoesBody: "CloudScout for Steam is a browser extension built to show cloud gaming availability, Game Pass signals, and Turkish language support information on supported Steam and Epic Games Store pages.",
          processedDataTitle: "what data is processed",
          processedData: [
            "Steam / Epic product identifiers (App ID, etc.)",
            "game title",
            "developer and publisher text (if available)",
            "Steam and Epic language support information",
            "user settings",
            "local cache / snapshot catalog data"
          ],
          whyProcessedTitle: "why it is processed",
          whyProcessed: [
            "to show cloud availability and Game Pass signals for the viewed game",
            "to detect Turkish interface, subtitle, and voice support",
            "to remember user settings",
            "to use local cache for performance"
          ],
          storedLocallyTitle: "what is stored locally",
          storedLocally: [
            "user settings",
            "bundled local snapshot catalog data",
            "latest analysis summary for the popup"
          ],
          notCollectedTitle: "what is not collected",
          notCollected: [
            "personally identifiable information",
            "Steam or Epic login credentials",
            "payment information",
            "purchase history",
            "browsing history outside supported store pages",
            "analytics or tracking event data"
          ],
          networkAccessTitle: "network access",
          networkAccessBody1: "In the current version, the extension only reads product information on supported Steam and Epic store pages and does not request broad access to unrelated sites.",
          networkAccessBody2: "Provider availability data comes from bundled local snapshot catalogs inside the extension package. No runtime catalog fetches are made from third-party provider domains. The extension does not run remote JavaScript.",
          dataSharingTitle: "data sharing",
          dataSharingBody1: "The extension does not send personal data to developer servers and does not share it with third parties. It does not require an account and does not use analytics or tracking.",
          dataSharingBody2: "If a user optionally sends information to the support email address, only the information shared by the user is reviewed for support purposes.",
          securityTitle: "security",
          security: [
            "Manifest V3",
            "No remote JavaScript",
            "Minimal permissions",
            "No broad access to unrelated sites",
            "Local-only settings and snapshot catalogs",
            "No analytics or tracking",
            "No account required"
          ],
          contactTitle: "contact",
          contactBody: "<a href='mailto:support@07x.nl' class='contact-link'>support@07x.nl</a>"
        }
      };

      const langButtons = Array.from(document.querySelectorAll("[data-lang-choice]"));
      const savedLang = localStorage.getItem("cloudscout-lang");
      const initialLang = savedLang === "tr" || savedLang === "en"
        ? savedLang
        : (navigator.language && navigator.language.toLowerCase().startsWith("tr") ? "tr" : "en");

      function renderList(id, items) {
        document.getElementById(id).innerHTML = items.map((item) => `<li>${item}</li>`).join("");
      }

      function applyLanguage(lang) {
        const t = translations[lang];
        document.documentElement.lang = lang;
        document.title = t.docTitle;
        document.getElementById("productLink").textContent = t.productLink;
        document.getElementById("homeLink").textContent = t.homeLink;
        document.getElementById("pageTitle").textContent = t.pageTitle;
        document.getElementById("lastUpdated").textContent = t.lastUpdated;
        document.getElementById("whatItDoesTitle").textContent = t.whatItDoesTitle;
        document.getElementById("whatItDoesBody").textContent = t.whatItDoesBody;
        document.getElementById("processedDataTitle").textContent = t.processedDataTitle;
        document.getElementById("whyProcessedTitle").textContent = t.whyProcessedTitle;
        document.getElementById("storedLocallyTitle").textContent = t.storedLocallyTitle;
        document.getElementById("notCollectedTitle").textContent = t.notCollectedTitle;
        document.getElementById("networkAccessTitle").textContent = t.networkAccessTitle;
        document.getElementById("networkAccessBody1").innerHTML = t.networkAccessBody1;
        document.getElementById("networkAccessBody2").innerHTML = t.networkAccessBody2;
        document.getElementById("dataSharingTitle").textContent = t.dataSharingTitle;
        document.getElementById("dataSharingBody1").textContent = t.dataSharingBody1;
        document.getElementById("dataSharingBody2").textContent = t.dataSharingBody2;
        document.getElementById("securityTitle").textContent = t.securityTitle;
        document.getElementById("contactTitle").textContent = t.contactTitle;
        document.getElementById("contactBody").innerHTML = t.contactBody;
        renderList("processedDataList", t.processedData);
        renderList("whyProcessedList", t.whyProcessed);
        renderList("storedLocallyList", t.storedLocally);
        renderList("notCollectedList", t.notCollected);
        renderList("securityList", t.security);
        localStorage.setItem("cloudscout-lang", lang);
        langButtons.forEach((button) => {
          const isActive = button.dataset.langChoice === lang;
          button.classList.toggle("active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });
      }

      langButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.dataset.langChoice));
      });

      applyLanguage(initialLang);
    })();
  </script>

  <script>
    (() => {
      const canvas = document.getElementById("spaceCanvas");
      const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });
      const faviconLink = document.getElementById("site-favicon");
      const motionMedia = window.matchMedia("(prefers-reduced-motion: reduce)");

      if (!ctx) return;
      ctx.imageSmoothingEnabled = false;

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        time: 0,
        lastTimestamp: 0,
        earthRotation: Math.random() * Math.PI * 2,
        lastFaviconUpdate: 0,
        stars: [],
        reducedMotion: motionMedia.matches,
        running: false,
        rafId: 0
      };

      function createStars() {
        const count = state.width < 720 ? 75 : 110;
        state.stars = Array.from({ length: count }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * state.height,
          size: Math.random() * 1.5 + 0.45,
          speed: Math.random() * 10 + 8,
          alpha: Math.random() * 0.55 + 0.2,
          twinkleSpeed: Math.random() * 1.8 + 0.8,
          twinklePhase: Math.random() * Math.PI * 2
        }));
      }

      function clamp(value, min, max) { return Math.min(max, Math.max(min, value)); }
      function normalize(vector) {
        const length = Math.hypot(vector.x, vector.y, vector.z) || 1;
        return { x: vector.x / length, y: vector.y / length, z: vector.z / length };
      }
      function blendColor(a, b, amount) {
        const t = clamp(amount, 0, 1);
        return { r: Math.round(a.r + (b.r - a.r) * t), g: Math.round(a.g + (b.g - a.g) * t), b: Math.round(a.b + (b.b - a.b) * t) };
      }
      function shadeColor(color, factor) {
        const f = Math.max(0, factor);
        return { r: clamp(Math.round(color.r * f), 0, 255), g: clamp(Math.round(color.g * f), 0, 255), b: clamp(Math.round(color.b * f), 0, 255) };
      }
      function toRgb(color) { return "rgb(" + color.r + ", " + color.g + ", " + color.b + ")"; }
      function terrainValue(longitude, latitude, rotation) {
        const waveA = Math.sin(longitude * 1.78 + rotation * 0.94 + 0.45);
        const waveB = Math.sin(longitude * 3.86 - latitude * 2.52 + 1.18);
        const waveC = Math.sin(longitude * 7.31 + latitude * 5.27 - 0.74);
        const waveD = Math.sin((longitude + latitude) * 4.62 + 2.33);
        const waveE = Math.sin(latitude * 6.41 - longitude * 2.08 + 0.61);
        return waveA * 0.45 + waveB * 0.29 + waveC * 0.16 + waveD * 0.1 + waveE * 0.08 - 0.03;
      }
      function cloudValue(longitude, latitude, rotation) {
        const cloudA = Math.sin(longitude * 11.4 + latitude * 7.7 + rotation * 0.36 + 1.4);
        const cloudB = Math.sin(longitude * 16.3 - latitude * 13.1 - rotation * 0.22 + 0.25);
        const cloudC = Math.sin((longitude - latitude) * 18.9 + 0.82);
        return cloudA * 0.44 + cloudB * 0.35 + cloudC * 0.21;
      }

      function updateFavicon(rotation) {
        if (!faviconLink) return;
        const size = 256;
        const iconCanvas = document.createElement("canvas");
        iconCanvas.width = size;
        iconCanvas.height = size;
        const iconCtx = iconCanvas.getContext("2d");
        if (!iconCtx) return;
        const center = size * 0.5;
        const radius = size * 0.38;
        const pixel = 4;
        const glow = iconCtx.createRadialGradient(center, center, radius * 0.72, center, center, radius * 1.55);
        glow.addColorStop(0, "rgba(110,181,255,0.32)");
        glow.addColorStop(1, "rgba(110,181,255,0)");
        iconCtx.fillStyle = glow;
        iconCtx.beginPath();
        iconCtx.arc(center, center, radius * 1.55, 0, Math.PI * 2);
        iconCtx.fill();
        const light = normalize({ x: 0.58, y: -0.34, z: 0.74 });
        const cosRotation = Math.cos(rotation);
        const sinRotation = Math.sin(rotation);
        for (let py = -radius; py <= radius; py += pixel) {
          for (let px = -radius; px <= radius; px += pixel) {
            const nx = (px + pixel * 0.5) / radius;
            const ny = (py + pixel * 0.5) / radius;
            const distSq = nx * nx + ny * ny;
            if (distSq > 1) continue;
            const nz = Math.sqrt(1 - distSq);
            const tx = nx * cosRotation + nz * sinRotation;
            const tz = -nx * sinRotation + nz * cosRotation;
            const longitude = Math.atan2(tz, tx);
            const latitude = Math.asin(ny);
            const polarAmount = Math.abs(latitude);
            const terrain = terrainValue(longitude, latitude, rotation);
            const cloud = cloudValue(longitude, latitude, rotation);
            let baseColor;
            if (polarAmount > 1.17) {
              baseColor = { r: 207, g: 233, b: 252 };
            } else if (terrain > 0.03) {
              const richness = clamp((terrain + 0.4) * 0.95, 0, 1.2);
              baseColor = { r: 47 + Math.round(34 * richness), g: 101 + Math.round(76 * richness), b: 66 + Math.round(33 * richness) };
            } else {
              const depth = clamp(Math.abs(terrain) * 1.95, 0, 1);
              baseColor = { r: 19 + Math.round(18 * depth), g: 65 + Math.round(43 * depth), b: 126 + Math.round(80 * depth) };
            }
            if (cloud > 0.74 && polarAmount < 1.43) {
              const cloudMix = clamp((cloud - 0.74) * 2.25 + 0.1, 0.12, 0.72);
              baseColor = blendColor(baseColor, { r: 235, g: 244, b: 255 }, cloudMix);
            }
            const dotProduct = Math.max(0, nx * light.x + ny * light.y + nz * light.z);
            const shadedColor = shadeColor(baseColor, 0.24 + dotProduct * 0.9);
            iconCtx.fillStyle = toRgb(shadedColor);
            iconCtx.fillRect(Math.round(center + px), Math.round(center + py), pixel, pixel);
          }
        }
        faviconLink.href = iconCanvas.toDataURL("image/png", 1.0);
      }

      function resize() {
        state.width = Math.max(1, Math.floor(window.innerWidth));
        state.height = Math.max(1, Math.floor(window.innerHeight));
        state.dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width = Math.floor(state.width * state.dpr);
        canvas.height = Math.floor(state.height * state.dpr);
        canvas.style.width = state.width + "px";
        canvas.style.height = state.height + "px";
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        createStars();
        draw();
        updateFavicon(state.earthRotation);
      }

      function updateStars(deltaSeconds) {
        for (const star of state.stars) {
          star.y -= star.speed * deltaSeconds;
          if (star.y < -2) {
            star.y = state.height + 2;
            star.x = Math.random() * state.width;
          }
        }
      }

      function draw() {
        ctx.fillStyle = "#0d0b14";
        ctx.fillRect(0, 0, state.width, state.height);
        for (const star of state.stars) {
          const twinkle = 0.65 + Math.sin(state.time * star.twinkleSpeed + star.twinklePhase) * 0.35;
          ctx.fillStyle = "rgba(255,255,255," + Math.max(0.12, star.alpha * twinkle).toFixed(3) + ")";
          ctx.fillRect(star.x, star.y, star.size, star.size);
        }
      }

      function frame(timestamp) {
        if (!state.running) return;
        if (!state.lastTimestamp) state.lastTimestamp = timestamp;
        const deltaSeconds = Math.min(0.05, (timestamp - state.lastTimestamp) / 1000);
        state.lastTimestamp = timestamp;
        state.time += deltaSeconds;
        state.earthRotation += deltaSeconds * 0.16;
        updateStars(deltaSeconds);
        draw();
        if (timestamp - state.lastFaviconUpdate > 12000) {
          updateFavicon(state.earthRotation);
          state.lastFaviconUpdate = timestamp;
        }
        state.rafId = window.requestAnimationFrame(frame);
      }

      function startAnimation() {
        if (state.running || state.reducedMotion) return;
        state.running = true;
        state.lastTimestamp = 0;
        state.rafId = window.requestAnimationFrame(frame);
      }

      function stopAnimation() {
        state.running = false;
        if (state.rafId) {
          window.cancelAnimationFrame(state.rafId);
          state.rafId = 0;
        }
      }

      function updateMotionPreference(isReduced) {
        state.reducedMotion = isReduced;
        if (state.reducedMotion) {
          stopAnimation();
          draw();
          return;
        }
        if (!document.hidden) startAnimation();
      }

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          stopAnimation();
          return;
        }
        if (!state.reducedMotion) startAnimation();
      });

      if (typeof motionMedia.addEventListener === "function") {
        motionMedia.addEventListener("change", (event) => updateMotionPreference(event.matches));
      } else if (typeof motionMedia.addListener === "function") {
        motionMedia.addListener((event) => updateMotionPreference(event.matches));
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();
      window.requestAnimationFrame(() => document.body.classList.add("page-ready"));
      updateMotionPreference(state.reducedMotion);
      updateFavicon(state.earthRotation);
      state.lastFaviconUpdate = performance.now();
    })();
  </script>
</body>
</html>
